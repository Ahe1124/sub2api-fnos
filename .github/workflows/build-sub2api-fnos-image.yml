name: Build Sub2API fnOS Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package/app/docker/**"
      - ".github/workflows/build-sub2api-fnos-image.yml"

env:
  IMAGE_NAME: sub2api-fnos
  IMAGE_VERSION: 0.1.4

permissions:
  contents: read
  packages: write

concurrency:
  group: sub2api-fnos-image
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: package/app/docker
          platforms: linux/amd64,linux/arm64
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Sub2API fnOS single-container image with embedded PostgreSQL and Redis
          tags: |
            ${{ steps.image.outputs.name }}:${{ env.IMAGE_VERSION }}
            ${{ steps.image.outputs.name }}:latest
