services:
  sub2api:
    image: sub2api-fnos:0.1.147
    container_name: sub2api
    restart: always
    network_mode: host
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - "/${TRIM_APPDEST_VOL}/@appshare/sub2api-docker/data:/app/data"
    env_file:
      - "/${TRIM_APPDEST_VOL}/@appshare/sub2api-docker/sub2api.env"
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8088
      - SERVER_MODE=release
      - DATABASE_HOST=127.0.0.1
      - DATABASE_PORT=15432
      - DATABASE_USER=sub2api_fnos
      - DATABASE_DBNAME=sub2api_fnos
      - DATABASE_SSLMODE=disable
      - POSTGRES_BIND=127.0.0.1
      - POSTGRES_PORT=15432
      - POSTGRES_DB=sub2api_fnos
      - POSTGRES_USER=sub2api_fnos
      - POSTGRES_DATA_DIR=/app/data/postgresql
      - POSTGRES_RUN_DIR=/app/data/postgresql-run
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=16379
      - REDIS_DATA_DIR=/app/data/redis
      - REDIS_ENABLE_TLS=false
      - SUB2API_WRITE_CONFIG=true
      - RUN_MODE=standard
      - SETUP_MIGRATION_TIMEOUT_SECONDS=0
      - TZ=Asia/Shanghai
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - LOG_OUTPUT_TO_STDOUT=true
      - LOG_OUTPUT_TO_FILE=true
      - SECURITY_URL_ALLOWLIST_ENABLED=false
      - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=true
      - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=true
      - GATEWAY_OPENAI_HTTP2_ENABLED=true
      - GATEWAY_OPENAI_HTTP2_ALLOW_PROXY_FALLBACK_TO_HTTP1=true
      - GATEWAY_IMAGE_CONCURRENCY_ENABLED=false
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
